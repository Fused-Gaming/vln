name: Deploy to Vercel

on:
  push:
    branches: ["main", "integration/vln"]
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"

jobs:
  deploy-main-site:
    name: 🚀 Deploy Main Site → Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 📡 Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Main site deployed: $DEPLOYMENT_URL"

  deploy-docs-site:
    name: 📚 Deploy Docs Site → Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 📡 Pull Vercel environment
        run: vercel pull --yes --environment=production --cwd=docs-site --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build via Vercel
        run: vercel build --prod --cwd=docs-site --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --cwd=docs-site --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Docs site deployed: $DEPLOYMENT_URL"

  deploy-design-site:
    name: 🎨 Deploy Design Site → Vercel
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DESIGN_PROJECT_ID }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 📡 Pull Vercel environment
        run: vercel pull --yes --environment=production --cwd=design-site --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build via Vercel
        run: vercel build --prod --cwd=design-site --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --cwd=design-site --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Design site deployed: $DEPLOYMENT_URL"
