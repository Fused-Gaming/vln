name: VLN CI/CD Pipeline

on:
  push:
    branches: ["main", "integration/vln"]
  pull_request:
    branches: ["main", "integration/vln"]
  workflow_dispatch:

env:
  NODE_VERSION: "24.x"

jobs:
  security-audit:
    name: 🔒 Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🎯 Setup Environment
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 VLN Security & Dependency Audit"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ Repository: ${{ github.repository }}"
          echo "✓ Branch: ${{ github.ref_name }}"
          echo "✓ Commit: ${{ github.sha }}"
          echo "✓ Author: ${{ github.actor }}"

      - name: 🔍 Check for exposed secrets
        run: |
          # Check if .env is tracked
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ CRITICAL: .env file is tracked in git!"
            exit 1
          fi
          echo "✓ No .env file tracked in git"

      - name: 📦 Check for package.json
        id: check_package
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
            echo "✓ package.json found"
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
            echo "⚠️  No package.json found - skipping Node.js steps"
          fi

      - name: 📦 Setup pnpm
        if: steps.check_package.outputs.has_package == 'true'
        continue-on-error: true
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        if: steps.check_package.outputs.has_package == 'true'
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 pnpm Audit
        if: steps.check_package.outputs.has_package == 'true'
        continue-on-error: true
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "→ Running pnpm security audit..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pnpm audit --prod || echo "⚠️  Vulnerabilities found - review required"

  lint:
    name: 🎨 Lint & Type Check
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Check for package.json
        id: check_package
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
            echo "✓ package.json found"
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
            echo "⚠️  No package.json found - skipping lint"
          fi

      - name: 📦 Setup pnpm
        if: steps.check_package.outputs.has_package == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        if: steps.check_package.outputs.has_package == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        if: steps.check_package.outputs.has_package == 'true'
        run: pnpm install --frozen-lockfile

      - name: 🎨 Run ESLint
        if: steps.check_package.outputs.has_package == 'true'
        continue-on-error: true
        run: pnpm lint

      - name: 🔍 Type Check
        if: steps.check_package.outputs.has_package == 'true'
        run: pnpm exec tsc --noEmit

  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Check for package.json
        id: check_package
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
            echo "✓ package.json found"
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
            echo "⚠️  No package.json found - skipping build"
          fi

      - name: 📦 Setup pnpm
        if: steps.check_package.outputs.has_package == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        if: steps.check_package.outputs.has_package == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        if: steps.check_package.outputs.has_package == 'true'
        run: |
          set -e
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "→ Installing dependencies..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pnpm install --frozen-lockfile
          echo "✓ Dependencies installed successfully"

      - name: 🏗️  Build project
        if: steps.check_package.outputs.has_package == 'true'
        run: |
          set -e
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "→ Building VLN website..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pnpm build

          # Verify .next directory was created
          if [ ! -d ".next" ]; then
            echo "❌ ERROR: Build did not produce .next directory"
            exit 1
          fi

          echo "✓ Build completed successfully"
          echo "✓ Output folder verified (.next/ exists)"

      - name: 🧪 Run tests
        if: steps.check_package.outputs.has_package == 'true'
        run: |
          set -e

          # Verify build output exists before testing
          if [ ! -d ".next" ]; then
            echo "❌ ERROR: Output folder .next/ does not exist - cannot run tests"
            exit 1
          fi
          echo "✓ Output folder verified before testing"

          # Check if any test files exist
          if find . -not -path "*/node_modules/*" -not -path "./docs-site/*" \( -name "*.test.*" -o -name "*.spec.*" \) | grep -q .; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "→ Running tests against build..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            pnpm test || echo "⚠️  Tests found but some failed - continuing"
            echo "✓ Test step completed"
          else
            echo "⚠️  No test files found - skipping tests"
            echo "   (Tests will run when *.test.* or *.spec.* files are added)"
          fi

      - name: 📊 Upload build artifacts
        if: steps.check_package.outputs.has_package == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7

  build-docs:
    name: 📚 Build Docs Site
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📥 Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build docs site
        working-directory: docs-site
        run: |
          set -e
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "→ Building VLN docs site (Astro Starlight)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pnpm build

          if [ ! -d "dist" ]; then
            echo "❌ ERROR: Build did not produce dist/ directory"
            exit 1
          fi

          echo "✓ Docs build completed successfully"
          echo "✓ Output folder verified (dist/ exists)"

  build-design:
    name: 🎨 Build Design Site
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📥 Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build design site
        working-directory: design-site
        run: |
          set -e
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "→ Building VLN design site (Astro Starlight)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pnpm build

          if [ ! -d "dist" ]; then
            echo "❌ ERROR: Build did not produce dist/ directory"
            exit 1
          fi

          echo "✓ Design site build completed successfully"
          echo "✓ Output folder verified (dist/ exists)"

  summary:
    name: 📋 Pipeline Summary & Diagnostics
    runs-on: ubuntu-latest
    needs: [security-audit, lint, build-and-test, build-docs, build-design]
    if: always()
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Generate Pipeline Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ VLN CI/CD Pipeline Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Job Results:"
          echo "  Security Audit:  ${{ needs.security-audit.result }}"
          echo "  Lint:            ${{ needs.lint.result }}"
          echo "  Build & Test:    ${{ needs.build-and-test.result }}"
          echo "  Build Docs:      ${{ needs.build-docs.result }}"
          echo "  Build Design:    ${{ needs.build-design.result }}"

      - name: 🔍 Run Diagnostics on Failure
        if: |
          needs.security-audit.result != 'success' ||
          needs.lint.result != 'success' ||
          needs.build-and-test.result != 'success' ||
          needs.build-docs.result != 'success' ||
          needs.build-design.result != 'success'
        id: diagnostics
        continue-on-error: true
        run: |
          chmod +x .github/scripts/analyze-build-failure.sh
          .github/scripts/analyze-build-failure.sh

      - name: 💬 Post Diagnostic Comment (PR)
        if: |
          github.event_name == 'pull_request' &&
          (needs.security-audit.result != 'success' ||
           needs.lint.result != 'success' ||
           needs.build-and-test.result != 'success' ||
           needs.build-docs.result != 'success' ||
           needs.build-design.result != 'success')
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const diagnosticReport = fs.existsSync('diagnostic-report.md')
              ? fs.readFileSync('diagnostic-report.md', 'utf8')
              : '## ⚠️ Build Failed\n\nAutomated diagnostics could not run. Please check the workflow logs.';

            const comment = `${diagnosticReport}

            ---

            **Pipeline Results:**
            - 🔒 Security Audit: \`${{ needs.security-audit.result }}\`
            - 🎨 Lint & Type Check: \`${{ needs.lint.result }}\`
            - 🔨 Build & Test: \`${{ needs.build-and-test.result }}\`
            - 📚 Build Docs: \`${{ needs.build-docs.result }}\`
            - 🎨 Build Design: \`${{ needs.build-design.result }}\`

            **Commit:** ${{ github.sha }}
            **Triggered by:** @${{ github.actor }}

            <sub>🤖 Automated by [VLN Build Diagnostics](.github/scripts/analyze-build-failure.sh)</sub>`;

            // Find existing diagnostic comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.body.includes('VLN Build Diagnostics')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing diagnostic comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              console.log('Posted new diagnostic comment');
            }

      - name: 💬 Post Diagnostic Comment (Commit)
        if: |
          github.event_name == 'push' &&
          (needs.security-audit.result != 'success' ||
           needs.lint.result != 'success' ||
           needs.build-and-test.result != 'success' ||
           needs.build-docs.result != 'success' ||
           needs.build-design.result != 'success')
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const diagnosticReport = fs.existsSync('diagnostic-report.md')
              ? fs.readFileSync('diagnostic-report.md', 'utf8')
              : '## ⚠️ Build Failed\n\nAutomated diagnostics could not run.';

            const comment = `${diagnosticReport}

            ---

            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}

            <sub>🤖 Automated by VLN Build Diagnostics</sub>`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: comment
            });
            console.log('Posted diagnostic comment on commit');

      - name: 🎉 Success Actions
        if: |
          needs.security-audit.result == 'success' &&
          needs.lint.result == 'success' &&
          needs.build-and-test.result == 'success' &&
          needs.build-docs.result == 'success' &&
          needs.build-design.result == 'success'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All pipeline steps completed successfully!"
          echo "🎉 Ready to merge!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ✅ Final Status Check
        run: |
          if [ "${{ needs.security-audit.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build-and-test.result }}" != "success" ] || \
             [ "${{ needs.build-docs.result }}" != "success" ] || \
             [ "${{ needs.build-design.result }}" != "success" ]; then
            echo "❌ Pipeline failed - diagnostics posted above"
            exit 1
          fi

      - name: 📢 Send Discord Notification
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/integration/vln')
        run: |
          # Determine overall status
          if [ "${{ needs.security-audit.result }}" == "success" ] && \
             [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.build-and-test.result }}" == "success" ] && \
             [ "${{ needs.build-docs.result }}" == "success" ] && \
             [ "${{ needs.build-design.result }}" == "success" ]; then
            STATUS="✅ Success"
            COLOR=5814783
            TITLE="✅ CI/CD Pipeline Passed"
          else
            STATUS="❌ Failed"
            COLOR=15548997
            TITLE="❌ CI/CD Pipeline Failed"
          fi

          # Build field for job statuses
          SECURITY_STATUS="${{ needs.security-audit.result == 'success' && '✅' || '❌' }} Security Audit: \`${{ needs.security-audit.result }}\`"
          LINT_STATUS="${{ needs.lint.result == 'success' && '✅' || '❌' }} Lint & Type Check: \`${{ needs.lint.result }}\`"
          BUILD_STATUS="${{ needs.build-and-test.result == 'success' && '✅' || '❌' }} Build & Test: \`${{ needs.build-and-test.result }}\`"
          DOCS_STATUS="${{ needs.build-docs.result == 'success' && '✅' || '❌' }} Build Docs: \`${{ needs.build-docs.result }}\`"
          DESIGN_STATUS="${{ needs.build-design.result == 'success' && '✅' || '❌' }} Build Design: \`${{ needs.build-design.result }}\`"

          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "'"$TITLE"'",
                "description": "**VLN CI/CD Pipeline Results**",
                "color": '"$COLOR"',
                "fields": [
                  {
                    "name": "Branch",
                    "value": "`${{ github.ref_name }}`",
                    "inline": true
                  },
                  {
                    "name": "Event",
                    "value": "`${{ github.event_name }}`",
                    "inline": true
                  },
                  {
                    "name": "Author",
                    "value": "${{ github.actor }}",
                    "inline": true
                  },
                  {
                    "name": "Job Results",
                    "value": "'"$SECURITY_STATUS"'\n'"$LINT_STATUS"'\n'"$BUILD_STATUS"'\n'"$DOCS_STATUS"'\n'"$DESIGN_STATUS"'",
                    "inline": false
                  },
                  {
                    "name": "Commit",
                    "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})",
                    "inline": false
                  },
                  {
                    "name": "Workflow Run",
                    "value": "[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "VLN CI/CD Bot"
                },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
